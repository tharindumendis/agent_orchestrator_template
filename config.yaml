# =============================================================================
# Notification Server (optional)
# Agent_head connects to this on startup in the background.
# It polls configured MCP servers and streams change events as notifications.
# When a change is detected, it is injected as an automatic task into the
# REPL loop (or displayed as an alert if the agent is busy).
# =============================================================================
notify_server:
  enabled: true
  command: "uvx"
  args: ["agent-notification-mcp"]
  env:
    AGENT_NOTIFY_CONFIG: "./service_config/notify_config.yaml"

# =============================================================================
# Direct MCP Tool Servers
# These are raw MCP servers (NOT worker agents). The orchestrator connects to
# them and uses their tools directly — no sub-agent loop involved.
# =============================================================================
mcp_clients:
  # - name: "rag_server"
  #   command: "D:\\DEV\\mcp\\universai\\orchestra\\Agent_rag\\.venv\\Scripts\\python.exe"
  #   args: ["D:\\DEV\\mcp\\universai\\orchestra\\Agent_rag\\server.py"]

  - name: "filesystem"
    command: "npx.cmd"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "../../"]

  # - name: "figma"
  #   transport: "http"
  #   url: "https://mcp.figma.com/mcp"

  # Telegram MCP — via published npm package (recommended)
  - name: "telegram"
    command: "npx.cmd"
    args: ["-y", "@tharindumendis100/tgcli", "mcp", "--transport", "stdio"]
    env:
      TELEGRAM_API_ID: "Your Telegram API ID here"
      TELEGRAM_API_HASH: "Your Telegram API Hash here"

  # - name: "brave-search"
