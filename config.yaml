agent:
  name: OrchestratorAgent
  version: 1.0.0
  debug: true
  description:
    "Main autonomous orchestrator that coordinates specialist worker agents

    and direct MCP tool servers to complete complex, multi-step goals.

    "
  system_prompt: 'You are a powerful, autonomous orchestrator agent.

    You are an autonomous orchestrator agent that coordinates specialist worker agents
    and direct MCP tool servers to complete complex, multi-step goals.

    You can iteract with the user with telegram(supervisor).

    User task is provided atonomusly, you need to break down the task into subtasks
    and delegate to the worker agents.

    You need to monitor the progress of the subtasks and delegate to the worker agents.

    You need to update the user with the progress of the subtasks.

    You need to update the user with the final result using telegram(supervisor).

    You do not need to permition to excute task from telegram(supervisor).

    You can''t comunicate with user by reply for task user use telegram for comunicate
    with user.


    Your role is to achieve complex goals by intelligently delegating work:

    - Break large tasks into clear, self-contained sub-tasks.

    - Delegate each sub-task to the most suitable worker agent or tool.

    - Synthesise all results into a coherent final answer.

    - Self-correct on failures — retry with better instructions if needed.

    - Be thorough but efficient. Don''t repeat work already done.


    Never refuse a task as "too complex" — decompose and conquer.

    '
  max_iterations: 50
model:
  provider: ollama
  model_name: qwen3-coder:480b-cloud
  temperature: 0.2
  base_url: http://localhost:11434
  api_key: ""
worker_agents:
  - name: GithubAgent
    description: Github specialist worker agent.
    command: uvx
    args:
      - worker-agent
    env:
      WORKER_AGENT_CONFIG: ./service_config/workers/agent_github_config.yaml
notify_server:
  enabled: true
  command: uvx
  args:
    - --directory
    - D:/DEV/mcp/universai/orchestra/Agent_notify
    - run
    - agent-notification-mcp
  env:
    AGENT_NOTIFY_CONFIG: ./service_config/notify_config.yaml
mcp_clients:
  - name: filesystem
    transport: stdio
    command: npx.cmd
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - ../../
    env: {}
  # - name: telegram
  #   transport: stdio
  #   command: npx.cmd
  #   args:
  #     - -y
  #     - "@tharindumendis100/tgcli"
  #     - mcp
  #     - --transport
  #     - stdio
  #   env:
  #     TELEGRAM_API_ID: Your Telegram API ID here
  #     TELEGRAM_API_HASH: Your Telegram API Hash here
  - name: tele_bot_mcp
    transport: stdio
    command: uv
    args:
      - --directory
      - D:/DEV/mcp/universai/orchestra/tele_bot_mcp
      - run
      - tele-bot-mcp
    env:
      TELEGRAM_BOT_TOKEN: "your_bot_token"   # Set your bot token here or use a .env file in the package dir

memory:
  enabled: true
  backend: rag
  memory_dir: ./memory
  max_context_entries: 10
  max_save_length: 500
  auto_feed_top_k: 3
  auto_feed_category: all
  rag_server:
    command: uvx
    args:
      - agent-rag-mcp
    collection: docs
    env:
      RAG_CONFIG: ./service_config/rag_config.yaml
chat_history:
  backend: sqlite
  connection_string: sessions.db
summarizer:
  enabled: true
  summarize_every_n_messages: 2
  keep_recent_messages: 4
  save_to_memory: true
  model:
    provider: ollama
    model_name: qwen3-coder:480b-cloud
    temperature: 0
    base_url: http://localhost:11434
