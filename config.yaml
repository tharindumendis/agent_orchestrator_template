# =============================================================================
# Agent_head — Orchestrator Configuration
# Clone and edit this file to configure your orchestration setup.
# =============================================================================

agent:
  name: "OrchestratorAgent"
  version: "1.0.0"
  description: |
    Main autonomous orchestrator that coordinates specialist worker agents
    and direct MCP tool servers to complete complex, multi-step goals.

  system_prompt: |
    You are a powerful, autonomous orchestrator agent.

    Your role is to achieve complex goals by intelligently delegating work:
    - Break large tasks into clear, self-contained sub-tasks.
    - Delegate each sub-task to the most suitable worker agent or tool.
    - Synthesise all results into a coherent final answer.
    - Self-correct on failures — retry with better instructions if needed.
    - Be thorough but efficient. Don't repeat work already done.

    Never refuse a task as "too complex" — decompose and conquer.

  max_iterations: 50 # Safety cap for the ReAct loop

# LLM that powers the orchestrator's reasoning
model:
  provider: "ollama" # Supported: "ollama", "openai", "gemini"
  model_name: "qwen3-coder:480b-cloud"
  temperature: 0.0
  base_url: "http://localhost:11434"
  # api_key: "your-api-key-here"  # Uncomment for openai / gemini

# =============================================================================
# Worker Agents
# Each entry is an MCP stdio subprocess exposing an `execute_task` tool.
# These are Agent_a-style worker agents. The orchestrator spawns and connects
# to them automatically, then uses their execute_task tool to delegate work.
# =============================================================================
worker_agents:
  # - name: "agent_a"
