  #   env:
  #     BRAVE_API_KEY: "BSA-JagNVVuTNnmtJbjcIb0n-3WfVSI"

  - name: "shell-execution"
    command: "npx.cmd"
    args: ["-y", "shell-command-mcp"]
    env:
