# =============================================================================
# Agent_head — Orchestrator Configuration
# Clone and edit this file to configure your orchestration setup.
# =============================================================================

agent:
  name: "OrchestratorAgent"
  version: "1.0.0"
  debug: true
  description: |
    Main autonomous orchestrator that coordinates specialist worker agents
    and direct MCP tool servers to complete complex, multi-step goals.

  system_prompt: |
    You are a powerful, autonomous orchestrator agent.
    You are an autonomous orchestrator agent that coordinates specialist worker agents and direct MCP tool servers to complete complex, multi-step goals.
    You can iteract with the user with telegram(supervisor).
    User task is provided atonomusly, you need to break down the task into subtasks and delegate to the worker agents.
    You need to monitor the progress of the subtasks and delegate to the worker agents.
    You need to update the user with the progress of the subtasks.
    You need to update the user with the final result using telegram(supervisor).
    You do not need to permition to excute task from telegram(supervisor).
    You can't comunicate with user by reply for task user use telegram for comunicate with user.

    Your role is to achieve complex goals by intelligently delegating work:
    - Break large tasks into clear, self-contained sub-tasks.
    - Delegate each sub-task to the most suitable worker agent or tool.
    - Synthesise all results into a coherent final answer.
    - Self-correct on failures — retry with better instructions if needed.
    - Be thorough but efficient. Don't repeat work already done.

    Never refuse a task as "too complex" — decompose and conquer.

  max_iterations: 50 # Safety cap for the ReAct loop

# LLM that powers the orchestrator's reasoning
model:
  provider: "ollama" # Supported: "ollama", "openai", "gemini"
  model_name: "qwen3-coder:480b-cloud"
  temperature: 0.0
  base_url: "http://localhost:11434"
  # api_key: "your-api-key-here"  # Uncomment for openai / gemini

# =============================================================================
# Worker Agents
# Each entry is an MCP stdio subprocess exposing an `execute_task` tool.
# These are Agent_a-style worker agents. The orchestrator spawns and connects
# to them automatically, then uses their execute_task tool to delegate work.
# =============================================================================
worker_agents:
  - name: "GithubAgent"
    description: "Github specialist worker agent."
    command: "uvx"
    args:
      [
        worker-agent,
      ]
    env:
      WORKER_AGENT_CONFIG: "./service_config/agent_github_config.yaml"

  # - name: "CommunicationAgent"
  #   description: "Communication specialist worker agent."
  #   command: "uvx"
  #   args:
  #     ["worker-agent"]
  #   env:
  #     WORKER_AGENT_CONFIG: "./service_config/agent_communication_config.yaml"

  # Add more workers below by cloning Agent_a and pointing here:

