# =============================================================================
# Notification Server (optional)
# Agent_head connects to this on startup in the background.
# It polls configured MCP servers and streams change events as notifications.
# When a change is detected, it is injected as an automatic task into the
# REPL loop (or displayed as an alert if the agent is busy).
# =============================================================================
notify_server:
  enabled: true
  command: "uvx"
  args:
    - agent-notification-mcp
  env:
    AGENT_NOTIFY_CONFIG: "./service_config/notify_config.yaml"

# =============================================================================
# Direct MCP Tool Servers
# These are raw MCP servers (NOT worker agents). The orchestrator connects to
# them and uses their tools directly — no sub-agent loop involved.
# =============================================================================
mcp_clients:
  # - name: test_http_server
  #   transport: "http" # supported: "stdio", "sse", "http"
  #   url: "http://localhost:8005/mcp"
  #   env: {}

  # Agent RAG server — a vector DB + retriever for long-term memory and contextual retrieval
  # - name: "rag_server"
  #   command: "uvx"
  #   args: ["agent-rag-mcp"]
  #   env:
  #     RAG_CONFIG: "./service_config/rag_config.yaml"

  # Filesystem server — exposes file read/write operations as MCP tools
  - name: "filesystem"
    command: "npx.cmd"
    args:
      [
        "-y",
        "@modelcontextprotocol/server-filesystem",
        "D:/DEV/mcp/universai/orchestra/Agent_head/sandbox",
      ]

  # Telegram MCP — via published npm package (recommended)
  # - name: "telegram"
  #   command: "npx.cmd"
