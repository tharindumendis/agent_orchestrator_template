# =============================================================================
# Long-Term Memory
# Automatically saves a job summary after each task and injects relevant
# past memories into the system prompt before the next task.
# =============================================================================
memory:
  enabled: true
  backend: "rag" # "jsonl" (default) | future: "sqlite" | "rag"
  memory_dir: "./memory" # relative to Agent_head directory
  max_context_entries: 10 # max past jobs injected into system prompt
  max_save_length: 500 # max chars stored per job summary
  auto_feed_top_k: 3 # how many relevant chunks (per category) to auto-inject into prompts
  auto_feed_category: "all" # "all", "history", or "facts" (for task-based bots)

  # Configure this if backend is set to "rag"
  rag_server:
    command: "uvx"
    args: ["agent-rag-mcp"]
    collection: "docs"
    env:
      RAG_CONFIG: "./service_config/rag_config.yaml"

# =============================================================================
# Chat History Interface (Session persistence)
# Supports swapping the continuous message storage backend (sqlite, mysql, mongo, etc.)
# =============================================================================
chat_history:
  backend: "sqlite" # currently supports: "sqlite"
  connection_string: "sessions.db" # relative to memory_dir, or absolute path

# =============================================================================
# Conversation History Summarizer
# When the REPL conversation history grows long, a lightweight LLM call
# compresses old messages into a rolling summary + reconciled fact list.
# Summary is injected back into history; new/changed facts are saved to memory.
# =============================================================================
summarizer:
  enabled: true
  summarize_every_n_messages: 6 # compress older items exactly every N messages
  keep_recent_messages: 4 # keep this many recent messages untouched for context
  save_to_memory: true # save facts and summaries to long-term memory

  # Can be a cheaper/faster model than the main orchestrator.
  # If omitted, falls back to the main model settings above.
  model:
    provider: "ollama"
    model_name: "qwen3-coder:480b-cloud" # change to a lighter model if available
    temperature: 0
    base_url: "http://localhost:11434"
    # api_key: ""

# =============================================================================
# Image Tools
# Built-in tools for reading, saving, screenshotting, and OCR-ing images.
# read_image is always available when enabled=true.
# =============================================================================
image_tools:
  enabled: true # master switch — set false to disable all image tools
  enable_save: true # save_image: download/copy images to disk
  enable_screenshot: true # screenshot: capture desktop screenshots (requires 'mss')
  enable_ocr: true # extract_text: OCR text extraction (requires 'pytesseract' + Tesseract)
  screenshot_dir: "./screenshots" # directory to auto-save screenshots

# =============================================================================
# Audio Tools
# Built-in tools for transcription (STT), text-to-speech (TTS), save, and record.
# =============================================================================
audio_tools:
  enabled: true # master switch — set false to disable all audio tools
  enable_transcribe: true # transcribe_audio: speech-to-text (requires SpeechRecognition + pydub + ffmpeg)
  enable_tts: true # text_to_speech: generate audio from text (requires gTTS)
  enable_save: true # save_audio: download/copy audio files
  enable_record: true # record_audio: record from microphone (requires sounddevice + scipy)
  enable_play: true # play_audio: play audio through speakers
  enable_speak: true # speak: TTS + immediate playback (agent voice)
  audio_dir: "./audio" # directory for auto-saved audio files

# =============================================================================
# MCP Server Mode
# Settings for when Agent_head is run as an MCP server (via `agent-mcp` command).
# This exposes the full orchestrator as MCP tools that other agents or clients
# (Claude Desktop, Cursor, other Agent_head instances) can connect to.
# =============================================================================
mcp_server:
  name: "agent-orchestrator" # MCP server identity name
  host: "127.0.0.1" # bind host for SSE/HTTP transports
  port: 8000 # bind port for SSE/HTTP transports
  log_dir: "./logs/mcp" # directory for MCP server + job logs
  default_progress:
    "summary" # progress streaming level: "none" | "summary" | "full"
    # none    — only return final answer
    # summary — stream tool call names + success/failure
    # full    — stream everything (tool args, results, LLM text)

# =============================================================================
# Skills
# Read-only knowledge documents that teach the agent how to do specific tasks.
# Auto-discovered by scanning all directories listed in skills_dirs.
#
# How it works:
#   - A compact catalog (name + description) is always injected into the system prompt.
#   - The agent calls the `load_skill` tool to fetch full content when needed.
#   - If prompt_skill_trigger is true, typing /skillname in a prompt auto-loads it.
#   - always_inject lists skills whose FULL content is loaded at every startup.
#
# Adding a new skill: create skills/<name>/SKILL.md — no code changes needed.
# =============================================================================
skills:
  enabled: true
  skills_dirs:
    - "./skills" # built-in skills folder
    - ".agents/skills"
    # - "/path/to/shared/company-skills"    # add more dirs here
  always_inject: [] # e.g. ["mysql"] to always load fully
  prompt_skill_trigger: true # set false for API/MCP bot deployments
