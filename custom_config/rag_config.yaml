# =============================================================================
# Agent_rag — RAG Server Configuration
# =============================================================================

server:
  name: "rag-server"
  transport: "stdio" # "stdio" or "sse"
  port: 8002 # used only when transport: sse
  host: "0.0.0.0"

embeddings:
  model: "all-MiniLM-L6-v2" # sentence-transformers model (downloads on first run)
  device: "cpu" # "cpu" or "cuda" if GPU available

store:
  persist_dir: "./chroma_db" # Uncomment to specify a custom absolute or relative path for ChromaDB
  default_collection: "default" # collection used when none is specified

chunking:
  chunk_size: 500 # max characters per chunk
  chunk_overlap: 50 # overlap between consecutive chunks

watch:
  enabled: true
  directories:
    - "./docs" # folder name will be used as the collection name

logging:
  level: "INFO" # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file_path: "./logs/rag_server.log" # log file path (relative to config or absolute)
  max_file_size: 10485760 # 10MB in bytes
  backup_count: 5 # number of backup files to keep